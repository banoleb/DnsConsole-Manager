<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dnsdist Web Console - Login</title>
    <link rel="icon" href="{{{ url_for('static', filename='favicon.ico') }}}" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{{ url_for('static', filename='css/style.css') }}}">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
        }
        .login-card h2 {
            margin-bottom: 1.5rem;
            text-align: center;
            color: var(--text-color);
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-label {
            display: block;
            margin-bottom: 0.4rem;
            color: var(--text-color);
            font-size: 0.9rem;
        }
        .form-control {
            width: 100%;
            padding: 0.5rem 0.75rem;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-color);
            border-radius: 4px;
            font-size: 1rem;
        }
        .form-control:focus {
            outline: none;
            border-color: #007bff;
        }
        .btn-primary {
            width: 100%;
            padding: 0.6rem;
            margin-top: 1rem;
            background: #b31f1f;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
        }
        .btn-primary:hover {
            background: #a01a1a;
        }
        .btn-sso {
            width: 100%;
            padding: 0.6rem;
            margin-top: 0.75rem;
            background: #1a5fa0;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: block;
        }
        .btn-sso:hover {
            background: #154d87;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1.25rem 0;
            color: var(--text-color);
            opacity: 0.5;
            font-size: 0.85rem;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-top: 1px solid var(--border-color);
        }
        .alert-error {
            background: #4a1a1a;
            border: 1px solid #b31f1f;
            color: #ffaaaa;
            border-radius: 4px;
            padding: 0.6rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2>DnsConsole-Manager</h2>
            {% if error %}
            <div class="alert-error">{{{ error }}}</div>
            {% endif %}

            {% if auth_enabled %}
            <form method="post" action="{{{ url_for('login') }}}">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input
                        class="form-control"
                        type="text"
                        id="username"
                        name="username"
                        autocomplete="username"
                        required
                        autofocus
                    >
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input
                        class="form-control"
                        type="password"
                        id="password"
                        name="password"
                        autocomplete="current-password"
                        required
                    >
                </div>
                <button class="btn-primary" type="submit">Sign In</button>
            </form>
            {% endif %}

            {% if auth_enabled and oidc_enabled %}
            <div class="divider">or</div>
            {% endif %}

            {% if oidc_enabled %}
            <a class="btn-sso" href="{{{ url_for('oidc_initiate') }}}">
                🔑 Sign in with SSO
            </a>
            {% endif %}
        </div>
    </div>
</body>
</html>
