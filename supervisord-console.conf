[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor
user=root 

[program:web]
command=bash -c "gunicorn -w 4 -b ${CONSOLE_HOST}:${CONSOLE_PORT} wsgi:app"
directory=/app

autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/web.log
stderr_logfile=/var/log/supervisor/web.error.log

[program:worker]
command=bash /syncer.sh
directory=/

autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/worker.log
stderr_logfile=/var/log/supervisor/worker.error.log
